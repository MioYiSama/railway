name: setup
description: Toolchains, dependencies, and Nx computation cache

runs:
  using: composite
  steps:
    - uses: pnpm/setup@v1
      with:
        runtime: node@26
        cache: true

    - uses: actions/setup-go@v6
      with:
        go-version: "1.26"
        # go.sum lives per-module under libs/* and services/*, not at the repo
        # root, so point the cache key at every module's checksum file.
        cache-dependency-path: "**/go.sum"

    - uses: bufbuild/buf-setup-action@v1

    - name: Install golangci-lint
      shell: bash
      run: curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/HEAD/install.sh | sh -s -- -b "$(go env GOPATH)/bin"

    # Persist Nx's local computation cache between runs. Keyed per-commit with a
    # branch-wide fallback so an unaffected project replays from cache instead of
    # recomputing. (No Nx Cloud — this is self-contained remote-less caching.)
    - name: Restore Nx cache
      uses: actions/cache@v5
      with:
        path: .nx/cache
        key: nx-${{ runner.os }}-${{ github.sha }}
        restore-keys: |
          nx-${{ runner.os }}-
