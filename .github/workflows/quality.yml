name: quality

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: pnpm
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - uses: bufbuild/buf-setup-action@v1

      - name: Install golangci-lint
        run: curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/HEAD/install.sh | sh -s -- -b "$(go env GOPATH)/bin"

      - run: pnpm install --frozen-lockfile
      - run: pnpm exec nx run libs-proto:codegen

      - name: Lint & test (TS + Go)
        run: pnpm exec nx run-many -t lint test
