name: railway

# ---- 复用片段 ----
x-go-service: &go-service
  environment: &go-env
    OTLP_ENDPOINT: otel-collector:4317
    GRPC_ADDR: ":50051"
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
    kafka:
      condition: service_started
    otel-collector:
      condition: service_started

services:
  # ============ 数据层 ============
  postgres:
    image: postgres:18
    environment:
      POSTGRES_USER: railway
      POSTGRES_PASSWORD: railway
      POSTGRES_DB: railway
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U railway"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:8
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  kafka:
    image: apache/kafka:3.9.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  seaweedfs:
    image: chrislusf/seaweedfs:latest
    command: "server -s3 -dir=/data"
    ports:
      - "8333:8333" # S3 API
      - "9333:9333" # master
    volumes:
      - seaweedfs-data:/data

  # ============ 可观测性 ============
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      - ./otel-collector/config.yaml:/etc/otel/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
    depends_on:
      - tempo
      - loki

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  tempo:
    image: grafana/tempo:latest
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    volumes:
      - ./tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo-data:/var/tempo
    ports:
      - "3200:3200"

  loki:
    image: grafana/loki:latest
    command: ["-config.file=/etc/loki/loki-config.yaml"]
    volumes:
      - ./loki/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - loki-data:/loki
    ports:
      - "3100:3100"

  grafana:
    image: grafana/grafana:latest
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - tempo
      - loki

  # ============ 接入层 ============
  caddy:
    image: caddy:2
    ports:
      - "8000:80"
      - "8001:81"
      - "8002:82"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ../apps/web/dist:/srv/web:ro
      - ../apps/admin/dist:/srv/admin:ro
      - ../apps/landing/dist:/srv/landing:ro
    depends_on:
      - api-gateway

  # ============ 微服务 ============
  api-gateway:
    build:
      context: ..
      dockerfile: services/api-gateway/Dockerfile
    environment:
      OTLP_ENDPOINT: otel-collector:4317
      HTTP_ADDR: ":8080"
    ports:
      - "8080:8080"
    depends_on:
      - otel-collector

  train-schedule:
    <<: *go-service
    build: { context: .., dockerfile: services/train-schedule/Dockerfile }

  ticket-query:
    <<: *go-service
    build: { context: .., dockerfile: services/ticket-query/Dockerfile }

  inventory-seat:
    <<: *go-service
    build: { context: .., dockerfile: services/inventory-seat/Dockerfile }

  order:
    <<: *go-service
    build: { context: .., dockerfile: services/order/Dockerfile }

  ticketing:
    <<: *go-service
    build: { context: .., dockerfile: services/ticketing/Dockerfile }

  user:
    <<: *go-service
    build: { context: .., dockerfile: services/user/Dockerfile }

  payment:
    <<: *go-service
    build: { context: .., dockerfile: services/payment/Dockerfile }

  notification:
    <<: *go-service
    build: { context: .., dockerfile: services/notification/Dockerfile }

volumes:
  postgres-data:
  seaweedfs-data:
  tempo-data:
  loki-data:
